# Nixpacks configuration for Lobster Report Backend

# 設定 Python 版本
[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "postgresql"]
commands = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[phases.build]
commands = []

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
